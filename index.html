<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  function redirect() {
    var hash = window.location.hash;
    var search = window.location.search;
    var extra = hash || search || '';
    if (extra) {
      window.location.replace('https://darionicolaslanata.github.io/finan-asos/' + extra);
    } else {
      window.location.replace('https://darionicolaslanata.github.io/finan-asos/');
    }
  }
  redirect();
</script>
</head>
<body>
<p>Redirecionando...</p>
</body>
</html>
